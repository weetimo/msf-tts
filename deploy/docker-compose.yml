# ASR inference stack — all three models on GPU1 (GPU0=tritonserver, GPU2/3=vllm-qwen)
#
# Ports:
#   9001  polyglot-lion-0.6b   (knoveleng/polyglot-lion-0.6b-v1.5)
#   9002  polyglot-lion-1.7b   (knoveleng/polyglot-lion-1.7b-v1.5)
#   9003  meralion-3b          (MERaLiON/MERaLiON-3-3B-ASR)
#
# GPU1 memory budget (20 GB):
#   0.6b  → gpu_memory_utilization 0.12 ≈  2.4 GB
#   1.7b  → gpu_memory_utilization 0.22 ≈  4.4 GB
#   3B    → gpu_memory_utilization 0.38 ≈  7.6 GB
#   total ≈ 14.4 GB (72% of 20 GB)
#
# Startup is serialised (depends_on + healthchecks) so vLLM processes don't
# race for GPU memory during KV-cache allocation.
#
# Build: DOCKER_HOST=unix:///var/run/docker.sock docker compose -f deploy/docker-compose.yml build
# Up:    DOCKER_HOST=unix:///var/run/docker.sock docker compose -f deploy/docker-compose.yml up -d

version: "3.8"

x-common: &common
  build: .
  image: asr-serve:latest
  volumes:
    - /home/user/.cache/huggingface:/root/.cache/huggingface:ro
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["1"]
            capabilities: [gpu]
  restart: unless-stopped
  ipc: host

services:

  polyglot-0.6b:
    <<: *common
    container_name: asr-polyglot-0.6b
    command:
      - qwen-asr-serve
      - knoveleng/polyglot-lion-0.6b-v1.5
      - --host
      - "0.0.0.0"
      - --port
      - "9001"
      - --dtype
      - bfloat16
      - --gpu-memory-utilization
      - "0.12"
      - --max-model-len
      - "512"
    ports:
      - "9001:9001"
    shm_size: 2g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9001/v1/models > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  polyglot-1.7b:
    <<: *common
    container_name: asr-polyglot-1.7b
    command:
      - qwen-asr-serve
      - knoveleng/polyglot-lion-1.7b-v1.5
      - --host
      - "0.0.0.0"
      - --port
      - "9002"
      - --dtype
      - bfloat16
      - --gpu-memory-utilization
      - "0.22"
      - --max-model-len
      - "512"
    ports:
      - "9002:9002"
    shm_size: 2g
    depends_on:
      polyglot-0.6b:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9002/v1/models > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  meralion-3b:
    <<: *common
    container_name: asr-meralion-3b
    command:
      - meralion-3-asr
      - serve
      - --model
      - MERaLiON/MERaLiON-3-3B-ASR
      - --host
      - "0.0.0.0"
      - --port
      - "9003"
      - --dtype
      - bfloat16
      - --gpu-memory-utilization
      - "0.38"
      - --max-model-len
      - "1300"
      - --internal-startup-timeout
      - "600"
    ports:
      - "9003:9003"
    shm_size: 4g
    environment:
      - VLLM_MAX_AUDIO_CLIP_FILESIZE_MB=512
    depends_on:
      polyglot-1.7b:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9003/v1/models > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s
